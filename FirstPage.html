<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page-Event Management</title>
    <link rel="stylesheet" href="FirstPage.css">
</head>
<body>
    <header>
        <div class="title">
            <h2>Event</h2>
            <h3>Management System</h3>
        </div>
        <nav>
            <a href="" class="active">Home</a>
            <a href="">Events</a>
            <a href="">Login</a>
            <a href="">Register</a>
            <a href="">Contact</a>
        </nav>
    </header>

    <main>
        <section class="section1">
            <div class="div1">
                <h1>Welcome to</h1>
                <h1>Event Management System</h1>
                <h3>Join Exciting College Events Easily</h3>
                <button class="btn1">Explore Events &#10132;</button>
            </div>
        </section>
        <section>
            <h1 class="heading">Upcoming Events</h1>
            <hr>

            <article class="event">
                <div>
                    <img src="hackathon-image.jpg" alt="" width="300px">
                </div>
                <div class="event-info">
                    <h2>Hackathon</h2>
                    <span>&#128197; 25 May 2025</span>
                    <span>&#128205; Jaipur</span>
                    <button class="btn">View Details  &#10132;</button>
                </div>
            </article>

            <br>
            <article class="event">
                <div>
                    <img src="Sports-image.jpg" alt="" width="300px" height="150">
                </div>
                <div class="event-info">
                    <h2>Sports Meet</h2>
                    <span>&#128197; 25 May 2025</span>
                    <span>&#128205; Jaipur</span>
                    <button class="btn">View Details  &#10132;</button>
                </div>
            </article>

            <br>

            <article class="event">
                <div>
                    <img src="Cultural-image.webp" alt="" width="300px" height="150" >
                </div>
                <div class="event-info">
                    <h2>Cultural Fest</h2>
                    <span>&#128197; 25 May 2025</span>
                    <span>&#128205; Jaipur</span>
                    <button class="btn">View Details  &#10132;</button>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
